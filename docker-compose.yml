services:
  postgres:
    image: postgres:16.4
    container_name: reconcile-postgres
    environment:
      POSTGRES_DB: reconcile
      POSTGRES_USER: reconcile
      POSTGRES_PASSWORD: reconcile
    ports:
      - "5432:5432"
    # wal_level=logical is required by Debezium's logical replication.
    # max_wal_senders / max_replication_slots leave headroom for the
    # connector to open a slot plus manual inspection from psql.
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - reconcile-net

  kafka:
    image: apache/kafka:3.9.0
    container_name: reconcile-kafka
    ports:
      - "9094:9094"
    environment:
      # Single-node KRaft (no Zookeeper). Two PLAINTEXT listeners:
      # 9092 for inside-docker traffic (Debezium → kafka:9092),
      # 9094 for host traffic (local consumers → localhost:9094).
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Deterministic 22-char base64 cluster ID; stable across restarts.
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - reconcile-net

  debezium-connect:
    image: debezium/connect:3.0.0.Final
    container_name: reconcile-debezium
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - postgres
    environment:
      BOOTSTRAP_SERVERS: "kafka:9092"
      GROUP_ID: "reconcile-connect"
      CONFIG_STORAGE_TOPIC: "reconcile-connect-configs"
      OFFSET_STORAGE_TOPIC: "reconcile-connect-offsets"
      STATUS_STORAGE_TOPIC: "reconcile-connect-statuses"
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
    networks:
      - reconcile-net

networks:
  reconcile-net:

volumes:
  postgres-data:
  kafka-data:
