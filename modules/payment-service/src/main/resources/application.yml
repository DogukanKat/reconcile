spring:
  application:
    name: payment-service

  datasource:
    # Hardcoded for local development. Real environments inject these.
    url: jdbc:postgresql://localhost:5432/reconcile
    username: reconcile
    password: reconcile

  jpa:
    hibernate:
      # Schema is owned by Flyway, not by Hibernate.
      ddl-auto: validate

  flyway:
    enabled: true

reconcile:
  # payment-service runs on the host via bootRun, so it reaches the
  # Schema Registry through the host port mapping (8085), not the
  # in-network 8081. A containerised deploy would override this with
  # http://schema-registry:8081.
  schema-registry:
    url: http://localhost:8085

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        # /actuator/prometheus is the Phase 2 contract for metrics
        # scraping. Health/info are Spring Boot defaults worth
        # exposing; everything else stays behind the actuator gate.
        include: prometheus,health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    dev.dogukankat: DEBUG
